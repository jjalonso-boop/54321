
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Space Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap');

        :root {
            --bg-color: #0d0d0d;
            --surface-color: #161616;
            --accent-color: #CCFF00; /* Verde Neón */
            --rest-color: #0096ff;   /* Azul para descanso */
            --text-main: #ffffff;
            --text-muted: #666666;
            --font-display: 'Bebas Neue', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 390px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            letter-spacing: 2px;
        }

        header p {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .screen {
            display: none;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Pantalla 1: Selección de Modo */
        .modes-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mode-card {
            background: var(--surface-color);
            border: 1px solid #222;
            padding: 35px 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
        }

        .mode-card:active {
            border-color: var(--accent-color);
            transform: scale(0.97);
        }

        .mode-card h2 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .mode-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Pantalla 2: Ajustes Rueda Minimalista */
        .selectors-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .picker-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface-color);
            padding: 18px 20px;
            border-radius: 14px;
        }

        .picker-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #aaa;
        }

        .wheel-view {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            width: 160px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            justify-content: flex-end;
        }
        .wheel-view::-webkit-scrollbar { display: none; }

        .wheel-item {
            font-size: 1.1rem;
            color: var(--text-muted);
            scroll-snap-align: center;
            cursor: pointer;
        }

        .wheel-item.selected {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.4rem;
        }

        /* Pantalla 3: Entrenamiento Activo */
        .workout-ui {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .badge {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 18px;
            border-radius: 20px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .badge.work { background: rgba(204, 255, 0, 0.15); color: var(--accent-color); border: 1px solid var(--accent-color); }
        .badge.rest { background: rgba(0, 150, 255, 0.15); color: var(--rest-color); border: 1px solid var(--rest-color); }

        .timer-number {
            font-family: var(--font-display);
            font-size: 8.5rem;
            line-height: 1;
        }

        .panels {
            display: flex;
            gap: 50px;
            margin-top: 30px;
        }

        .panel-data {
            font-size: 1.6rem;
            font-weight: bold;
        }

        .panel-data span {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Botones de Acción */
        .actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn:active { opacity: 0.8; }
        .btn-go { background: var(--accent-color); color: #000; }
        .btn-stop { background: #222; color: #fff; }

        /* ANIMACIÓN COHETE (CUENTA ATRÁS) */
        .rocket-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(13,13,13,0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .rocket-number {
            font-family: var(--font-display);
            font-size: 12rem;
            color: var(--accent-color);
            opacity: 0;
            transform: scale(2.5);
        }

        @keyframes rocketPulse {
            0% { opacity: 1; transform: scale(2.5); }
            80% { opacity: 0.8; transform: scale(0.6); }
            100% { opacity: 0; transform: scale(0.2); }
        }

        .launch-animation {
            animation: rocketPulse 0.95s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>GYM SPACE PRO</h1>
        <p id="sub-title">Elige modalidad</p>
    </header>

    <div id="screen-modes" class="screen active">
        <div class="modes-container">
            <div class="mode-card" onclick="chooseMode('time')">
                <h2>MODO TIEMPO</h2>
                <p>Entrenamiento clásico por intervalos. El tiempo manda. Ideal para resistencia física.</p>
            </div>
            <div class="mode-card" onclick="chooseMode('reps')">
                <h2>MODO REPETICIONES</h2>
                <p>Haz las repes a tope de velocidad y pulsa la pantalla al terminar. ¡Perfecto para competir!</p>
            </div>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <div class="selectors-list" id="selectors-render"></div>
        <div class="actions">
            <button class="btn btn-stop" onclick="goTo('modes')">Atrás</button>
            <button class="btn btn-go" onclick="triggerRocketLaunch()">IGNICIÓN 🚀</button>
        </div>
    </div>

    <div id="screen-train" class="screen">
        <div class="workout-ui">
            <div id="workout-badge" class="badge work">TRABAJO</div>
            <div id="workout-timer" class="timer-number">00</div>
            
            <div class="panels">
                <div class="panel-data"><div id="p-series">1/3</div><span>Series</span></div>
                <div class="panel-data" id="p-reps-box"><div id="p-reps">10</div><span>Reps Objetivo</span></div>
            </div>
        </div>
        <div class="actions">
            <button class="btn btn-go" id="btn-done-reps" onclick="nextSegmentReps()" style="display:none; background-color: #fff; color: #000; font-size: 1.2rem;">¡HECHO!</button>
            <button class="btn btn-stop" style="background-color: #ba1a1a;" onclick="forceQuit()">PARAR</button>
        </div>
    </div>
</div>

<div class="rocket-screen" id="rocket-screen">
    <div class="rocket-number" id="rocket-text">5</div>
</div>

<script>
    let mode = 'time'; 
    let settings = { time: 45, reps: 10, rest: 15, series: 3 };
    let runtime = { seriesLeft: 0, currentPhase: 'work', interval: null, seconds: 0 };

    function sound(freq, duration) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); setTimeout(() => osc.stop(), duration);
    }

    function goTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`screen-${screenId}`).classList.add('active');
        if(screenId === 'modes') document.getElementById('sub-title').innerText = "Elige modalidad";
    }

    function chooseMode(selectedMode) {
        mode = selectedMode;
        document.getElementById('sub-title').innerText = mode === 'time' ? "Ajustes de Tiempo" : "Ajustes de Repes";
        
        let container = document.getElementById('selectors-render');
        let html = '';

        if(mode === 'time') {
            html += renderWheelRow('Tiempo Ejercicio (s)', 'time', [15, 30, 45, 60, 90], 45);
        } else {
            html += renderWheelRow('Repeticiones', 'reps', [5, 10, 12, 15, 20, 25, 30], 10);
        }
        html += renderWheelRow('Descanso (s)', 'rest', [10, 15, 20, 30, 45, 60], 15);
        html += renderWheelRow('Series Totales', 'series', [1, 2, 3, 4, 5, 6], 3);
        
        container.innerHTML = html;
        goTo('setup');
    }

    function renderWheelRow(label, key, arrayOptions, defaultVal) {
        let items = '';
        arrayOptions.forEach(opt => {
            let activeClass = opt === defaultVal ? 'selected' : '';
            items += `<div class="wheel-item ${activeClass}" onclick="updateValue(this, '${key}', ${opt})">${opt}</div>`;
        });
        return `<div class="picker-row"><div class="picker-label">${label}</div><div class="wheel-view">${items}</div></div>`;
    }

    function updateValue(element, key, val) {
        element.parentElement.querySelectorAll('.wheel-item').forEach(i => i.classList.remove('selected'));
        element.classList.add('selected');
        settings[key] = val;
    }

    // ANIMACIÓN CUENTA ATRÁS DEL COHETE CON ZOOM HACIA EL CENTRO Y DESVANECIDO
    function triggerRocketLaunch() {
        const overlay = document.getElementById('rocket-screen');
        const textNode = document.getElementById('rocket-text');
        overlay.style.display = 'flex';
        
        let countdown = 5;

        function runPulse() {
            if (countdown > 0) {
                textNode.innerText = countdown;
                textNode.className = 'rocket-number launch-animation';
                sound(550, 120); // Sonido sutil de cuenta atrás
                
                setTimeout(() => {
                    textNode.className = 'rocket-number'; // Reset animación para el siguiente
                    countdown--;
                    setTimeout(runPulse, 50);
                }, 950);
            } else {
                textNode.innerText = "¡GO!";
                textNode.className = 'rocket-number launch-animation';
                sound(900, 500); // Sonido de salida
                setTimeout(() => {
                    overlay.style.display = 'none';
                    textNode.className = 'rocket-number';
                    startWorkoutEngine();
                }, 1000);
            }
        }
        runPulse();
    }

    function startWorkoutEngine() {
        goTo('train');
        runtime.seriesLeft = settings.series;
        refreshSeriesUILabel();

        if (mode === 'time') {
            document.getElementById('p-reps-box').style.display = 'none';
            document.getElementById('btn-done-reps').style.display = 'none';
            executeTimePhase();
        } else {
            document.getElementById('p-reps-box').style.display = 'block';
            document.getElementById('p-reps').innerText = settings.reps;
            document.getElementById('btn-done-reps').style.display = 'block';
            executeRepsPhase();
        }
    }

    function refreshSeriesUILabel() {
        let current = settings.series - runtime.seriesLeft + 1;
        document.getElementById('p-series').innerText = `${current}/${settings.series}`;
    }

    function executeTimePhase() {
        runtime.currentPhase = 'work';
        runtime.seconds = settings.time;
        
        let badge = document.getElementById('workout-badge');
        badge.innerText = "¡DALE!";
        badge.className = "badge work";
        
        updateTimerText(runtime.seconds);

        runtime.interval = setInterval(() => {
            runtime.seconds--;
            updateTimerText(runtime.seconds);

            if(runtime.seconds <= 3 && runtime.seconds > 0) sound(440, 80);

            if(runtime.seconds <= 0) {
                clearInterval(runtime.interval);
                sound(700, 300);
                executeRestPhase();
            }
        }, 1000);
    }

    function executeRepsPhase() {
        runtime.currentPhase = 'work';
        let badge = document.getElementById('workout-badge');
        badge.innerText = "HAZ LAS REPETICIONES";
        badge.className = "badge work";
        document.getElementById('workout-timer').innerText = "GO";
    }

    function nextSegmentReps() {
        if(runtime.currentPhase === 'work' && mode === 'reps') {
            sound(700, 300);
            document.getElementById('btn-done-reps').style.display = 'none';
            executeRestPhase();
        }
    }

    function executeRestPhase() {
        runtime.currentPhase = 'rest';
        runtime.seconds = settings.rest;
        
        let badge = document.getElementById('workout-badge');
        badge.innerText = "DESCANSO";
        badge.className = "badge rest";
        
        updateTimerText(runtime.seconds);

        runtime.interval = setInterval(() => {
            runtime.seconds--;
            updateTimerText(runtime.seconds);

            if(runtime.seconds <= 3 && runtime.seconds > 0) sound(440, 80);

            if(runtime.seconds <= 0) {
                clearInterval(runtime.interval);
                sound(1000, 400);
                
                runtime.seriesLeft--;
                if(runtime.seriesLeft > 0) {
                    refreshSeriesUILabel();
                    if(mode === 'time') {
                        executeTimePhase();
                    } else {
                        document.getElementById('btn-done-reps').style.display = 'block';
                        executeRepsPhase();
                    }
                } else {
                    finishWorkout();
                }
            }
        }, 1000);
    }

    function updateTimerText(val) {
        document.getElementById('workout-timer').innerText = val < 10 ? '0' + val : val;
    }

    function finishWorkout() {
        forceQuit();
        alert("🎯 ¡Entrenamiento completado! Brutal.");
    }

    function forceQuit() {
        clearInterval(runtime.interval);
        goTo('modes');
    }
</script>
</body>
</html>
