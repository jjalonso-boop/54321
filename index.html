<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Space Pro v3.0</title>
    
    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230d0d0d%22/><text x=%2250%22 y=%2261%22 font-family=%22system-ui, -apple-system, sans-serif%22 font-size=%2225%22 font-weight=%22900%22 fill=%22%23ffffff%22 letter-spacing=%22-1.2%22 text-anchor=%22middle%22>54321</text></svg>">
    
    <!-- Chart.js para el gráfico de barras -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap');
        
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #161616;
            --accent-color: #CCFF00;
            --rest-color: #0096ff;
            --text-main: #ffffff;
            --text-muted: #888888;
            --font-display: 'Bebas Neue', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 390px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 2.2rem;
            letter-spacing: 1.5px;
            text-align: center;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .screen {
            display: none;
            flex-direction: column;
            flex-grow: 1;
            justify-content: center;
            height: 100%;
        }

        .screen.active {
            display: flex;
        }

        /* Tarjetas de Modo */
        .mode-card {
            background: var(--surface-color);
            border: 1px solid #222;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
            transition: transform 0.1s ease, border-color 0.2s;
        }
        .mode-card:active { transform: scale(0.98); }
        .mode-card h2 { font-family: var(--font-display); font-size: 2.2rem; margin-bottom: 5px; }
        .mode-card p { color: var(--text-muted); font-size: 0.9rem; }

        /* Selector de Configuración */
        .setup-group {
            margin-bottom: 25px;
        }
        .setup-label {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .setup-label span { color: var(--text-main); font-size: 1.2rem; }
        .slider-control {
            width: 100%;
            -webkit-appearance: none;
            background: #222;
            height: 8px;
            border-radius: 4px;
            outline: none;
        }
        .slider-control::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
        }

        /* Botones de Control por voz (Interruptor) */
        .btn-voice {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #888;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
        }
        .btn-voice.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(204, 255, 0, 0.05);
        }
        .voice-mic-dot {
            width: 8px;
            height: 8px;
            background: #444;
            border-radius: 50%;
        }
        .btn-voice.active .voice-mic-dot {
            background: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
            animation: pulse-mic 1.5s infinite;
        }
        @keyframes pulse-mic {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        #voice-indicator {
            text-align: center;
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 15px;
            height: 20px;
            display: none;
        }

        /* Pantalla de Entrenamiento */
        .badge {
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 24px;
            border-radius: 20px;
            margin: 0 auto 15px auto;
            font-weight: 800;
            display: inline-block;
            text-align: center;
        }
        .badge.work { background: rgba(204, 255, 0, 0.15); color: var(--accent-color); border: 1px solid var(--accent-color); }
        .badge.rest { background: rgba(0, 150, 255, 0.15); color: var(--rest-color); border: 1px solid var(--rest-color); }
        
        .timer-number {
            font-family: var(--font-display);
            font-size: 11rem;
            font-weight: 900;
            text-align: center;
            line-height: 1;
            margin-bottom: 20px;
        }
        .series-counter {
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .series-counter span { color: var(--text-main); font-weight: 700; }

        /* Sección de Gráficos e Historial */
        .history-section {
            background: var(--surface-color);
            border: 1px solid #222;
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
        }
        .history-section h3 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Botones Genéricos */
        .btn {
            padding: 22px;
            border-radius: 18px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s ease;
        }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>GYM SPACE PRO</h1>
    </header>

    <!-- PANTALLA 1: MODOS -->
    <div id="screen-modes" class="screen active">
        <div class="mode-card" onclick="chooseMode('time')">
            <h2>MODO TIEMPO</h2>
            <p>Trabajas por tiempo (p.ej. planchas, HIIT)</p>
        </div>
        <div class="mode-card" onclick="chooseMode('reps')">
            <h2>MODO REPETICIONES</h2>
            <p>Haces tus repeticiones y marcas al acabar (Fuerza)</p>
        </div>

        <!-- El interruptor de control por voz -->
        <button id="toggle-voice" class="btn-voice" onclick="toggleVoice()">
            <div class="voice-mic-dot"></div>
            <span>CONTROL POR VOZ: DESACTIVADO</span>
        </button>

        <!-- Sección de estadísticas en local -->
        <div class="history-section">
            <h3>TUS ÚLTIMAS SESIONES</h3>
            <canvas id="history-chart" style="max-height: 120px; width: 100%;"></canvas>
        </div>
    </div>

    <!-- PANTALLA 2: CONFIGURACIÓN -->
    <div id="screen-setup" class="screen">
        <div id="selectors-render"></div>
        <button class="btn" style="background: var(--accent-color); color: #000;" onclick="triggerRocketLaunch()">IGNICIÓN</button>
    </div>

    <!-- PANTALLA 3: ENTRENAMIENTO -->
    <div id="screen-train" class="screen" style="text-align: center;">
        <div id="voice-indicator">🎤 ESCUCHANDO... di "HECHO" o "PARAR"</div>
        <div id="workout-badge" class="badge work">TRABAJO</div>
        <div id="workout-timer" class="timer-number">00</div>
        <div id="series-counter" class="series-counter">SERIE <span>1 de 3</span></div>
        <button id="main-train-btn" class="btn" style="background: var(--accent-color); color: #000; margin-bottom: 12px;" onclick="nextSegmentReps()">SIGUIENTE</button>
        <button class="btn" style="background: #1a1a1a; color: #ba1a1a; border: 1px solid #333;" onclick="forceQuit()">PARAR</button>
    </div>
</div>

<script>
    // --- ESTADO GLOBAL & CONFIGURACIÓN ---
    var isVoiceEnabled = false;
    var recognition = null;
    var mode = 'time'; // 'time' o 'reps'
    var settings = {
        time: 45,
        reps: 10,
        rest: 30,
        series: 4
    };
    var runtime = {
        currentSeries: 1,
        currentPhase: 'work', // 'work' o 'rest'
        secondsLeft: 0,
        interval: null,
        audioCtx: null
    };

    // --- INDEXEDDB (BASE DE DATOS LOCAL Y SEGURA) ---
    var db;
    var request = indexedDB.open("GymSpaceDB", 1);
    request.onupgradeneeded = function(e) {
        db = e.target.result;
        if (!db.objectStoreNames.contains("workouts")) {
            db.createObjectStore("workouts", { keyPath: "id", autoIncrement: true });
        }
    };
    request.onsuccess = function(e) {
        db = e.target.result;
        renderHistoryChart();
    };

    // --- AUDIOS SIN ARCHIVOS (Sintetizador Web para no usar MP3s) ---
    function playBeep(type) {
        if (!runtime.audioCtx) {
            runtime.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        var osc = runtime.audioCtx.createOscillator();
        var gain = runtime.audioCtx.createGain();
        osc.connect(gain);
        gain.connect(runtime.audioCtx.destination);

        if (type === 'start') {
            // Pitido doble motivador
            osc.frequency.setValueAtTime(880, runtime.audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, runtime.audioCtx.currentTime);
            osc.start();
            osc.stop(runtime.audioCtx.currentTime + 0.15);
            
            setTimeout(() => {
                var osc2 = runtime.audioCtx.createOscillator();
                var gain2 = runtime.audioCtx.createGain();
                osc2.connect(gain2);
                gain2.connect(runtime.audioCtx.destination);
                osc2.frequency.setValueAtTime(1200, runtime.audioCtx.currentTime);
                gain2.gain.setValueAtTime(0.1, runtime.audioCtx.currentTime);
                osc2.start();
                osc2.stop(runtime.audioCtx.currentTime + 0.35);
            }, 180);
        } else if (type === 'end') {
            // Pitido grave de parada
            osc.frequency.setValueAtTime(330, runtime.audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, runtime.audioCtx.currentTime);
            osc.start();
            osc.stop(runtime.audioCtx.currentTime + 0.6);
        } else {
            // Pitido corto estándar (cuenta atrás)
            osc.frequency.setValueAtTime(440, runtime.audioCtx.currentTime);
            gain.gain.setValueAtTime(0.08, runtime.audioCtx.currentTime);
            osc.start();
            osc.stop(runtime.audioCtx.currentTime + 0.1);
        }
    }

    // --- MOTOR DE CONTROL POR VOZ (SEGURO Y TEMPORAL) ---
    function toggleVoice() {
        isVoiceEnabled = !isVoiceEnabled;
        var btn = document.getElementById('toggle-voice');
        var span = btn.querySelector('span');
        
        if (isVoiceEnabled) {
            span.innerText = "CONTROL POR VOZ: ACTIVADO";
            btn.classList.add('active');
            initVoice();
        } else {
            span.innerText = "CONTROL POR VOZ: DESACTIVADO";
            btn.classList.remove('active');
            stopVoice();
        }
    }

    function initVoice() {
        if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
            alert("Vaya, parece que tu navegador o móvil no soporta comandos de voz.");
            isVoiceEnabled = false;
            toggleVoice();
            return;
        }

        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            var command = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
            console.log("Comando escuchado:", command);

            // Filtramos comandos muy sencillos
            if (command.includes('hecho') || command.includes('echo') || command.includes('ok') || command.includes('ya')) {
                nextSegmentReps();
            }
            if (command.includes('parar') || command.includes('stop') || command.includes('pausa')) {
                forceQuit();
            }
        };

        recognition.onerror = function(event) {
            console.warn("Reconocimiento de voz detenido o en pausa.");
        };

        // Si se detiene por inactividad del sistema, lo volvemos a levantar sólo si sigue encendido
        recognition.onend = () => {
            if (isVoiceEnabled && document.getElementById('screen-train').classList.contains('active')) {
                try { recognition.start(); } catch(e) {}
            }
        };
    }

    function startVoiceListening() {
        if (isVoiceEnabled && recognition) {
            try {
                recognition.start();
                document.getElementById('voice-indicator').style.display = 'block';
            } catch(e) {
                console.log("Ya estaba escuchando.");
            }
        }
    }

    function stopVoice() {
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        document.getElementById('voice-indicator').style.display = 'none';
    }

    // --- FLUJO DE LA APLICACIÓN ---
    function chooseMode(selected) {
        mode = selected;
        goTo('setup');
        renderSelectors();
    }

    function renderSelectors() {
        var container = document.getElementById('selectors-render');
        if (mode === 'time') {
            container.innerHTML = `
                <div class="setup-group">
                    <div class="setup-label">Tiempo Trabajo <span id="val-time">${settings.time}s</span></div>
                    <input type="range" class="slider-control" min="5" max="180" step="5" value="${settings.time}" oninput="updateVal('time', this.value)">
                </div>
                <div class="setup-group">
                    <div class="setup-label">Tiempo Descanso <span id="val-rest">${settings.rest}s</span></div>
                    <input type="range" class="slider-control" min="5" max="180" step="5" value="${settings.rest}" oninput="updateVal('rest', this.value)">
                </div>
                <div class="setup-group">
                    <div class="setup-label">Series Totales <span id="val-series">${settings.series}</span></div>
                    <input type="range" class="slider-control" min="1" max="12" step="1" value="${settings.series}" oninput="updateVal('series', this.value)">
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="setup-group">
                    <div class="setup-label">Repeticiones aprox. <span id="val-reps">${settings.reps}</span></div>
                    <input type="range" class="slider-control" min="1" max="30" step="1" value="${settings.reps}" oninput="updateVal('reps', this.value)">
                </div>
                <div class="setup-group">
                    <div class="setup-label">Tiempo Descanso <span id="val-rest">${settings.rest}s</span></div>
                    <input type="range" class="slider-control" min="5" max="180" step="5" value="${settings.rest}" oninput="updateVal('rest', this.value)">
                </div>
                <div class="setup-group">
                    <div class="setup-label">Series Totales <span id="val-series">${settings.series}</span></div>
                    <input type="range" class="slider-control" min="1" max="12" step="1" value="${settings.series}" oninput="updateVal('series', this.value)">
                </div>
            `;
        }
    }

    function updateVal(key, val) {
        settings[key] = parseInt(val);
        document.getElementById('val-' + key).innerText = (key === 'series') ? val : val + 's';
    }

    function goTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + screenId).classList.add('active');
    }

    // --- TEMPORIZADOR Y CONTROL DE ENTRENAMIENTO ---
    function triggerRocketLaunch() {
        goTo('train');
        runtime.currentSeries = 1;
        runtime.currentPhase = 'work';
        
        // Solicitar bloqueo de pantalla para evitar que se apague el móvil
        if ('keepWakeLock' in navigator || 'wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(() => {});
        }

        // Si la voz está encendida en el interruptor principal, empezamos a escuchar ahora
        if (isVoiceEnabled) {
            startVoiceListening();
        }

        if (mode === 'time') {
            document.getElementById('main-train-btn').style.display = 'none'; // El modo tiempo corre solo
            runTimer(settings.time);
        } else {
            document.getElementById('main-train-btn').style.display = 'block'; // Mostrar el botón "Hecho"
            document.getElementById('main-train-btn').innerText = '¡HECHO!';
            document.getElementById('workout-timer').innerText = 'GO';
            document.getElementById('workout-badge').innerText = 'TRABAJO';
            document.getElementById('workout-badge').className = 'badge work';
            document.getElementById('series-counter').innerHTML = `SERIE <span>${runtime.currentSeries} de ${settings.series}</span>`;
            playBeep('start');
        }
    }

    function runTimer(seconds) {
        runtime.secondsLeft = seconds;
        updateTimerDisplay();
        
        // Pequeño retardo para encajar el primer pitido
        playBeep('start');

        clearInterval(runtime.interval);
        runtime.interval = setInterval(() => {
            runtime.secondsLeft--;
            updateTimerDisplay();

            if (runtime.secondsLeft <= 3 && runtime.secondsLeft > 0) {
                playBeep('tick');
            }

            if (runtime.secondsLeft <= 0) {
                clearInterval(runtime.interval);
                if (runtime.currentPhase === 'work') {
                    executeRest();
                } else {
                    executeWork();
                }
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        var m = Math.floor(runtime.secondsLeft / 60);
        var s = runtime.secondsLeft % 60;
        document.getElementById('workout-timer').innerText = 
            (m > 0 ? m + ':' : '') + (s < 10 ? '0' : '') + s;
    }

    function executeRest() {
        playBeep('end');
        runtime.currentPhase = 'rest';
        document.getElementById('workout-badge').innerText = 'DESCANSO';
        document.getElementById('workout-badge').className = 'badge rest';
        document.getElementById('main-train-btn').style.display = 'none'; // No se puede pulsar "Hecho" en descanso
        runTimer(settings.rest);
    }

    function executeWork() {
        runtime.currentSeries++;
        if (runtime.currentSeries > settings.series) {
            endWorkout();
            return;
        }

        runtime.currentPhase = 'work';
        document.getElementById('workout-badge').innerText = 'TRABAJO';
        document.getElementById('workout-badge').className = 'badge work';
        document.getElementById('series-counter').innerHTML = `SERIE <span>${runtime.currentSeries} de ${settings.series}</span>`;

        if (mode === 'time') {
            runTimer(settings.time);
        } else {
            document.getElementById('main-train-btn').style.display = 'block';
            document.getElementById('workout-timer').innerText = 'GO';
            playBeep('start');
        }
    }

    // Usado en modo repeticiones (manual o por voz)
    function nextSegmentReps() {
        if (runtime.currentPhase === 'work') {
            executeRest();
        }
    }

    function endWorkout() {
        clearInterval(runtime.interval);
        playBeep('start');
        stopVoice();

        // Guardamos los datos de la sesión localmente
        var transaction = db.transaction(["workouts"], "readwrite");
        var store = transaction.objectStore("workouts");
        var totalMinutes = (mode === 'time') 
            ? ((settings.time + settings.rest) * settings.series) / 60
            : (settings.rest * settings.series) / 60; // aprox.

        store.add({
            date: new Date().toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric' }),
            series: settings.series,
            mode: mode
        });

        transaction.oncomplete = function() {
            renderHistoryChart();
        };

        alert("¡ENTRENAMIENTO COMPLETADO! ¡Menudo titán!");
        goTo('modes');
    }

    function forceQuit() {
        clearInterval(runtime.interval);
        stopVoice();
        goTo('modes');
    }

    // --- RENDERIZADO DEL GRÁFICO (CON CHART.JS DESDE LOCAL) ---
    var historyChart = null;
    function renderHistoryChart() {
        if (!db) return;
        var transaction = db.transaction(["workouts"], "readonly");
        var store = transaction.objectStore("workouts");
        var request = store.getAll();

        request.onsuccess = function() {
            var data = request.result;
            // Nos quedamos solo con los últimos 5 entrenos para que quepa bien en el móvil
            var lastFive = data.slice(-5);

            var labels = lastFive.map(w => w.date);
            var seriesData = lastFive.map(w => w.series);

            if (historyChart) historyChart.destroy();

            var ctx = document.getElementById('history-chart').getContext('2d');
            historyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.length ? labels : ['Sin datos'],
                    datasets: [{
                        label: 'Series Completadas',
                        data: seriesData.length ? seriesData : [0],
                        backgroundColor: '#CCFF00',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#222' }, ticks: { color: '#888' } },
                        x: { grid: { display: false }, ticks: { color: '#888' } }
                    }
                }
            });
        };
    }
</script>
</body>
</html>
