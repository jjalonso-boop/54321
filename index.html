<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Space Pro v1.1.0</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230d0d0d%22/><text x=%2250%22 y=%2261%22 font-family=%22system-ui, -apple-system, sans-serif%22 font-size=%2225%22 font-weight=%22900%22 fill=%22%23ffffff%22 letter-spacing=%22-1.2%22 text-anchor=%22middle%22>54321</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230d0d0d%22/><text x=%2250%22 y=%2261%22 font-family=%22system-ui, -apple-system, sans-serif%22 font-size=%2225%22 font-weight=%22900%22 fill=%22%23ffffff%22 letter-spacing=%22-1.2%22 text-anchor=%22middle%22>54321</text></svg>">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght=400;700&display=swap');
        :root { --bg-color: #0d0d0d; --surface-color: #161616; --accent-color: #CCFF00; --rest-color: #0096ff; --text-main: #ffffff; --text-muted: #333333; --font-display: 'Bebas Neue', sans-serif; --font-body: 'Inter', sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-body); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 390px; height: 95vh; display: flex; flex-direction: column; justify-content: space-between; transition: opacity 0.4s ease, transform 0.4s ease; }
        .app-container.shutdown { opacity: 0; transform: scale(0.96); pointer-events: none; }

        header { text-align: center; margin-bottom: 5px; }
        header h1 { font-family: var(--font-display); font-size: 3.2rem; letter-spacing: 2px; }
        header p { font-size: 0.85rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        
        .screen { display: none; flex-direction: column; flex-grow: 1; justify-content: center; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease-out forwards; }
        
        .modes-container { display: flex; flex-direction: column; gap: 15px; }
        .mode-card { background: var(--surface-color); border: 1px solid #222; padding: 30px 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, transform 0.2s; }
        .mode-card:active { border-color: var(--accent-color); transform: scale(0.97); }
        .mode-card h2 { font-family: var(--font-display); font-size: 2.3rem; letter-spacing: 1px; margin-bottom: 6px; }
        .mode-card p { font-size: 0.85rem; color: #888; line-height: 1.4; }
        
        .mode-card.btn-exit-app { border: 1px dashed #ba1a1a; padding: 20px; }
        .mode-card.btn-exit-app:active { border-color: #ff3333; background: #221111; transform: scale(0.97); }
        .mode-card.btn-exit-app h2 { font-size: 1.8rem; color: #ff5555; margin-bottom: 0; }

        .selectors-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        .picker-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface-color); padding: 5px 25px; border-radius: 20px; height: 130px; border: 1px solid #1f1f1f; }
        .picker-label { font-size: 0.95rem; font-weight: 700; color: #eee; max-width: 45%; line-height: 1.2; }
        .wheel-container { position: relative; height: 120px; width: 140px; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .wheel-container::-webkit-scrollbar { display: none; }
        .wheel-space { height: 40px; }
        .wheel-item { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: var(--text-muted); font-weight: 400; scroll-snap-align: center; white-space: nowrap; }
        .wheel-item.selected { color: var(--accent-color); font-weight: 700; font-size: 1.6rem; }
        
        .workout-ui { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; }
        .badge { font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; padding: 8px 24px; border-radius: 20px; margin-bottom: 5px; font-weight: bold; }
        .badge.work { background: rgba(204, 255, 0, 0.15); color: var(--accent-color); border: 1px solid var(--accent-color); }
        .badge.rest { background: rgba(0, 150, 255, 0.15); color: var(--rest-color); border: 1px solid var(--rest-color); }
        
        /* TAMAÑO BASE SEGURO PARA 2 DÍGITOS */
        .timer-number { font-family: var(--font-display); font-size: 15rem; font-weight: 900; line-height: 0.85; letter-spacing: -4px; margin: 10px 0; transition: font-size 0.2s ease; }
        /* CLASE DINÁMICA CUANDO SE CARGAN 3 DÍGITOS */
        .timer-number.triple-digit { font-size: 9.5rem; letter-spacing: -2px; }
        
        .panels { display: flex; gap: 60px; margin-top: 5px; margin-bottom: 15px; }
        .panel-data { font-size: 2.2rem; font-weight: bold; }
        .panel-data span { display: block; font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        
        .actions-wrapper { padding-bottom: 55px; width: 100%; }
        .actions { display: flex; gap: 15px; width: 100%; }
        
        .btn { flex: 1; padding: 22px; border-radius: 18px; border: none; font-family: var(--font-body); font-weight: 700; font-size: 1.2rem; cursor: pointer; }
        .btn:active { opacity: 0.75; }
        .btn-go { background: var(--accent-color); color: #000; }
        .btn-stop { background: #222; color: #fff; }
        
        .rocket-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(13,13,13,0.98); display: none; align-items: center; justify-content: center; z-index: 999; }
        .rocket-number { font-family: var(--font-display); font-size: 16rem; font-weight: 900; color: var(--accent-color); opacity: 0; transform: scale(2.5); }
        @keyframes rocketPulse { 0% { opacity: 1; transform: scale(2.5); } 80% { opacity: 0.8; transform: scale(0.6); } 100% { opacity: 0; transform: scale(0.2); } }
        .launch-animation { animation: rocketPulse 0.95s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container" id="app-viewport">
    <header>
        <h1 id="main-title">GYM SPACE PRO</h1>
        <p id="sub-title">Elige modalidad</p>
    </header>

    <div id="screen-modes" class="screen active">
        <div class="modes-container">
            <div class="mode-card" onclick="chooseMode('time')"><h2>MODO TIEMPO</h2><p>Entrenamiento clásico por intervalos.</p></div>
            <div class="mode-card" onclick="chooseMode('reps')"><h2>MODO REPETICIONES</h2><p>Haz las repes a tope y pulsa.</p></div>
            <div class="mode-card btn-exit-app" onclick="closeApp()"><h2>SALIR ✕</h2></div>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <div class="selectors-list" id="selectors-render"></div>
        <div class="actions-wrapper">
            <div class="actions">
                <button class="btn btn-stop" onclick="goTo('modes')">Atrás</button>
                <button class="btn btn-go" onclick="triggerRocketLaunch()">IGNICIÓN 🚀</button>
            </div>
        </div>
    </div>

    <div id="screen-train" class="screen">
        <div class="workout-ui">
            <div id="workout-badge" class="badge work">TRABAJO</div>
            <div id="workout-timer" class="timer-number">00</div>
            <div class="panels">
                <div class="panel-data"><div id="p-series">1/3</div><span>Series</span></div>
                <div class="panel-data" id="p-reps-box"><div id="p-reps">10</div><span>Reps</span></div>
            </div>
        </div>
        <div class="actions-wrapper">
            <div class="actions">
                <button class="btn btn-go" id="btn-done-reps" onclick="nextSegmentReps()" style="display:none; background-color: #fff; color: #000; font-size: 1.4rem;">¡HECHO!</button>
                <button class="btn btn-stop" style="background-color: #ba1a1a;" onclick="forceQuit()">PARAR</button>
            </div>
        </div>
    </div>
</div>

<div class="rocket-screen" id="rocket-screen"><div class="rocket-number" id="rocket-text">5</div></div>

<script>
    var mode = 'time'; 
    var settings = { time: 45, reps: 10, rest: 15, series: 3 };
    var runtime = { seriesLeft: 0, currentPhase: 'work', interval: null, seconds: 0 };
    
    var audioCtx = null;

    function sound(freq, duration) {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            var osc = audioCtx.createOscillator(); 
            var gain = audioCtx.createGain();
            osc.type = 'triangle'; 
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            osc.connect(gain); 
            gain.connect(audioCtx.destination);
            osc.start(); 
            setTimeout(function() { 
                try { 
                    osc.stop(); 
                    osc.disconnect(); 
                } catch(e){} 
            }, duration);
        } catch(e) { 
            console.log("Audio bloqueado"); 
        }
    }

    function playTripleBeepRest() {
        sound(850, 80);
        setTimeout(function() { sound(850, 80); }, 280);
        setTimeout(function() { sound(850, 120); }, 560);
    }

    function playLongBeepWork() {
        sound(380, 750);
    }

    function initAudioOnFirstTouch() {
        if (!audioCtx) {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
        }
    }

    function closeApp() {
        sound(400, 250);
        if (runtime.interval) { clearInterval(runtime.interval); }
        var container = document.getElementById('app-viewport');
        container.classList.add('shutdown');
        window.close();
        setTimeout(function() {
            container.classList.remove('shutdown');
            goTo('modes');
        }, 1200);
    }

    function goTo(screenId) {
        var screens = document.querySelectorAll('.screen');
        for (var i = 0; i < screens.length; i++) {
            screens[i].classList.remove('active');
        }
        document.getElementById('screen-' + screenId).classList.add('active');
        if (screenId === 'modes') { 
            document.getElementById('main-title').innerText = "GYM SPACE PRO"; 
            document.getElementById('sub-title').innerText = "Elige modalidad"; 
        }
    }

    function chooseMode(selectedMode) {
        initAudioOnFirstTouch();
        sound(500, 50); 
        mode = selectedMode;
        document.getElementById('sub-title').innerText = mode === 'time' ? "Ajustes de Tiempo" : "Ajustes de Repes";
        var container = document.getElementById('selectors-render'); 
        container.innerHTML = ''; 
        
        if (mode === 'time') {
            // Ampliado hasta 300sg (5 minutos) con leyendas informativas claras
            var timeOpts = [
                {v: 10, t: "10 sg"}, {v: 15, t: "15 sg"}, {v: 20, t: "20 sg"}, 
                {v: 30, t: "30 sg"}, {v: 45, t: "45 sg"}, {v: 60, t: "60 sg"}, 
                {v: 75, t: "75 sg"}, {v: 90, t: "90 sg"}, {v: 120, t: "120 sg (2m)"}, 
                {v: 180, t: "180 sg (3m)"}, {v: 240, t: "240 sg (4m)"}, {v: 300, t: "300 sg (5m)"}
            ];
            container.appendChild(createWheelRow('Tiempo Ejercicio', 'time', timeOpts, 45));
        } else {
            var repsOpts = [
                {v: 5, t: "5"}, {v: 8, t: "8"}, {v: 10, t: "10"}, {v: 12, t: "12"}, 
                {v: 15, t: "15"}, {v: 20, t: "20"}, {v: 25, t: "25"}, {v: 30, t: "30"}, 
                {v: 40, t: "40"}, {v: 50, t: "50"}
            ];
            container.appendChild(createWheelRow('Repeticiones', 'reps', repsOpts, 10));
        }
        
        var restOpts = [
            {v: 5, t: "5 sg"}, {v: 10, t: "10 sg"}, {v: 15, t: "15 sg"}, 
            {v: 20, t: "20 sg"}, {v: 25, t: "25 sg"}, {v: 30, t: "30 sg"}, 
            {v: 45, t: "45 sg"}, {v: 60, t: "60 sg"}, {v: 90, t: "90 sg"},
            {v: 120, t: "120 sg (2m)"}, {v: 180, t: "180 sg (3m)"}
        ];
        container.appendChild(createWheelRow('Descanso', 'rest', restOpts, 15));
        
        var seriesOpts = [
            {v: 1, t: "1"}, {v: 2, t: "2"}, {v: 3, t: "3"}, {v: 4, t: "4"}, 
            {v: 5, t: "5"}, {v: 6, t: "6"}, {v: 7, t: "7"}, {v: 8, t: "8"}, 
            {v: 9, t: "9"}, {v: 10, t: "10"}
        ];
        container.appendChild(createWheelRow('Series Totales', 'series', seriesOpts, 3));
        goTo('setup');
    }

    function createWheelRow(label, key, options, defaultVal) {
        var row = document.createElement('div'); 
        row.className = 'picker-row';
        var labelDiv = document.createElement('div'); 
        labelDiv.className = 'picker-label'; 
        labelDiv.innerText = label; 
        row.appendChild(labelDiv);
        
        var wheelContainer = document.createElement('div'); 
        wheelContainer.className = 'wheel-container';
        wheelContainer.appendChild(document.createElement('div')).className = 'wheel-space';
        
        var defaultIndex = 0;
        options.forEach(function(opt, idx) {
            var item = document.createElement('div'); 
            item.className = 'wheel-item'; 
            item.innerText = opt.t; 
            item.setAttribute('data-value', opt.v);
            if (opt.v === defaultVal) defaultIndex = idx; 
            wheelContainer.appendChild(item);
        });
        
        wheelContainer.appendChild(document.createElement('div')).className = 'wheel-space';
        
        function updateSelected() {
            var containerCenter = wheelContainer.scrollTop + 60;
            var items = wheelContainer.querySelectorAll('.wheel-item');
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var dist = Math.abs(containerCenter - (item.offsetTop + 20));
                if (dist < 30) { 
                    item.classList.add('selected'); 
                    settings[key] = parseInt(item.getAttribute('data-value')); 
                } else {
                    item.classList.remove('selected');
                }
            }
        }
        
        wheelContainer.addEventListener('scroll', updateSelected); 
        row.appendChild(wheelContainer);
        
        setTimeout(function() { 
            wheelContainer.scrollTop = defaultIndex * 40; 
            updateSelected(); 
        }, 50);
        
        return row;
    }

    function triggerRocketLaunch() {
        initAudioOnFirstTouch();
        var overlay = document.getElementById('rocket-screen'); 
        var textNode = document.getElementById('rocket-text');
        overlay.style.display = 'flex'; 
        var countdown = 5;
        
        function runPulse() {
            if (countdown > 0) {
                textNode.innerText = countdown; 
                textNode.className = 'rocket-number launch-animation';
                sound(340, 180); 
                setTimeout(function() { 
                    textNode.className = 'rocket-number'; 
                    countdown--; 
                    setTimeout(runPulse, 50); 
                }, 950);
            } else {
                textNode.innerText = "¡GO!"; 
                textNode.className = 'rocket-number launch-animation';
                playLongBeepWork(); 
                setTimeout(function() { 
                    overlay.style.display = 'none'; 
                    startWorkoutEngine(); 
                }, 1000);
            }
        }
        runPulse();
    }

    function startWorkoutEngine() {
        if (runtime.interval) { clearInterval(runtime.interval); }
        goTo('train'); 
        runtime.seriesLeft = settings.series; 
        refreshSeriesUILabel();
        document.getElementById('main-title').innerText = mode === 'time' ? "MODO TIEMPO" : "MODO REPETICIONES";
        document.getElementById('sub-title').innerText = "En marcha";
        
        if (mode === 'time') { 
            document.getElementById('p-reps-box').style.display = 'none'; 
            document.getElementById('btn-done-reps').style.display = 'none'; 
            executeTimePhase(); 
        } else { 
            document.getElementById('p-reps-box').style.display = 'block'; 
            document.getElementById('p-reps').innerText = settings.reps; 
            document.getElementById('btn-done-reps').style.display = 'block'; 
            executeRepsPhase(); 
        }
    }

    function refreshSeriesUILabel() { 
        document.getElementById('p-series').innerText = (settings.series - runtime.seriesLeft + 1) + '/' + settings.series; 
    }
    
    function executeTimePhase() { 
        if (runtime.interval) { clearInterval(runtime.interval); }
        runtime.currentPhase = 'work'; 
        runtime.seconds = settings.time; 
        document.getElementById('workout-badge').className = "badge work"; 
        document.getElementById('workout-badge').innerText = "¡DALE!"; 
        updateTimerText(runtime.seconds); 
        
        runtime.interval = setInterval(function() { 
            runtime.seconds--; 
            updateTimerText(runtime.seconds); 
            if (runtime.seconds > 0 && runtime.seconds <= 5) { sound(900, 120); }
            if (runtime.seconds <= 0) { 
                clearInterval(runtime.interval); 
                playTripleBeepRest(); 
                executeRestPhase(); 
            } 
        }, 1000); 
    }
    
    function executeRepsPhase() { 
        if (runtime.interval) { clearInterval(runtime.interval); }
        runtime.currentPhase = 'work'; 
        document.getElementById('workout-badge').className = "badge work"; 
        document.getElementById('workout-badge').innerText = "HAZ LAS REPETICIONES"; 
        
        var timerElement = document.getElementById('workout-timer');
        timerElement.classList.remove('triple-digit');
        timerElement.innerText = "GO"; 
    }
    
    function nextSegmentReps() { 
        if (runtime.currentPhase === 'work' && mode === 'reps') { 
            playTripleBeepRest(); 
            document.getElementById('btn-done-reps').style.display = 'none'; 
            executeRestPhase(); 
        } 
    }
    
    function executeRestPhase() { 
        if (runtime.interval) { clearInterval(runtime.interval); }
        runtime.currentPhase = 'rest'; 
        runtime.seconds = settings.rest; 
        document.getElementById('workout-badge').className = "badge rest"; 
        document.getElementById('workout-badge').innerText = "DESCANSO"; 
        updateTimerText(runtime.seconds); 
        
        runtime.interval = setInterval(function() { 
            runtime.seconds--; 
            updateTimerText(runtime.seconds); 
            if (runtime.seconds > 0 && runtime.seconds <= 5) { sound(340, 150); }
            if (runtime.seconds <= 0) { 
                clearInterval(runtime.interval); 
                runtime.seriesLeft--; 
                
                if (runtime.seriesLeft > 0) { 
                    playLongBeepWork(); 
                    refreshSeriesUILabel(); 
                    if (mode === 'time') { 
                        executeTimePhase(); 
                    } else { 
                        document.getElementById('btn-done-reps').style.display = 'block'; 
                        executeRepsPhase(); 
                    } 
                } else { 
                    sound(600, 1200); 
                    finishWorkout(); 
                } 
            } 
        }, 1000); 
    }
    
    function updateTimerText(val) { 
        var timerElement = document.getElementById('workout-timer');
        
        // CONTROL DINÁMICO DE FUENTE ANTI-DESBORDE (Para números de 3 dígitos)
        if (val >= 100) {
            timerElement.classList.add('triple-digit');
            timerElement.innerText = val;
        } else {
            timerElement.classList.remove('triple-digit');
            timerElement.innerText = val < 10 ? '0' + val : val; 
        }
    }
    
    function finishWorkout() { 
        forceQuit(); 
        setTimeout(function() { alert("🎯 ¡Entrenamiento completado!"); }, 150);
    }
    
    function forceQuit() { 
        if (runtime.interval) { clearInterval(runtime.interval); }
        goTo('modes'); 
    }
</script>
</body>
</html>
