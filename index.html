<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Carga CAFYD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #2c3e50; color: #ffffff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #34495e; }
        canvas { margin-top: 30px; width: 100% !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Carga</h2>
    
    <div class="input-group">
        <input type="number" id="sets" placeholder="Series">
        <input type="number" id="reps" placeholder="Reps">
    </div>
    
    <button id="btnRegistrar">REGISTRAR SESIÓN</button>

    <canvas id="progresoChart"></canvas>
</div>

<script>
    const btn = document.getElementById('btnRegistrar');
    let chart;

    function cargarDatos() {
        return JSON.parse(localStorage.getItem('entrenos')) || [];
    }

    function guardarDato(volumen) {
        const datos = cargarDatos();
        datos.push({
            fecha: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' }),
            volumen: volumen
        });
        localStorage.setItem('entrenos', JSON.stringify(datos));
        renderizarGrafica();
    }

    function renderizarGrafica() {
        const datos = cargarDatos();
        const ctx = document.getElementById('progresoChart').getContext('2d');
        
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: datos.map(d => d.fecha),
                datasets: [{
                    label: 'Volumen Total (Sets x Reps)',
                    data: datos.map(d => d.volumen),
                    borderColor: '#2c3e50',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(44, 62, 80, 0.1)'
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });
    }

    btn.addEventListener('click', () => {
        const sets = parseInt(document.getElementById('sets').value);
        const reps = parseInt(document.getElementById('reps').value);
        
        if (sets && reps) {
            guardarDato(sets * reps);
            document.getElementById('sets').value = '';
            document.getElementById('reps').value = '';
        } else {
            alert("Por favor, introduce series y repeticiones.");
        }
    });

    renderizarGrafica();
</script>

</body>
</html>
