<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>54321 Pro</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link class="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230d0d0d%22/><text x=%2250%22 y=%2261%22 font-family=%22system-ui, sans-serif%22 font-size=%2225%22 font-weight=%22900%22 fill=%22%23ffffff%22 text-anchor=%22middle%22>54321</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js?v=4.1"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #0d0d0d;
            --accent-color: #CCFF00;
            --rest-color: #0096ff;
            --text-main: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        body.phase-rest { background-color: #001220; }
        .app-container { width: 100%; max-width: 400px; height: 100vh; display: flex; flex-direction: column; }
        .screen { display: none; flex-direction: column; flex-grow: 1; padding: 20px; }
        .screen.active { display: flex; }

        /* Timer "Pro" Estilo */
        .train-status-panel { text-align: center; padding: 20px 0; }
        .timer-number { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 35vw; /* Esto hace que los números sean gigantes y adaptables */
            font-weight: 900; 
            line-height: 0.8;
            margin-bottom: 10px;
        }
        .badge { font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; padding: 6px 20px; border-radius: 20px; font-weight: 800; border: 1px solid currentColor; display: inline-block; }
        
        /* Zona de Impacto */
        .giant-action-zone {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .giant-action-zone:active { background: rgba(204, 255, 0, 0.1); border-color: var(--accent-color); transform: scale(0.98); }
        .giant-action-text { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: #666; text-align: center; pointer-events: none; }
        .giant-action-zone:active .giant-action-text { color: var(--accent-color); }
        
        .btn { padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        /* Ajustes básicos de lista */
        .mode-card { background: #161616; padding: 20px; border-radius: 20px; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-modes" class="screen active">
        <h1 style="font-family:'Bebas Neue'; font-size: 3rem; margin-bottom: 20px; text-align:center;">54321</h1>
        <div class="mode-card" onclick="chooseMode('time')"><h2>MODO TIEMPO</h2></div>
        <div class="mode-card" onclick="chooseMode('reps')"><h2>MODO REPETICIONES</h2></div>
        <canvas id="history-chart" style="max-height: 120px;"></canvas>
    </div>

    <div id="screen-setup" class="screen" style="justify-content: center;">
        <div id="selectors-render"></div>
        <button class="btn" style="background: var(--accent-color); color: #000; margin-top:20px;" onclick="triggerRocketLaunch()">INICIAR COHETE 🚀</button>
    </div>

    <div id="screen-train" class="screen">
        <div class="train-status-panel">
            <div id="workout-badge" class="badge">TRABAJO</div>
            <div id="workout-timer" class="timer-number">00</div>
        </div>
        <div id="giant-btn" class="giant-action-zone" onclick="nextSegmentReps()">
            <div id="giant-btn-text" class="giant-action-text">PULSA PARA<br>CONTINUAR</div>
        </div>
        <button class="btn" style="background: #222; color: #fff;" onclick="forceQuit()">DETENER</button>
    </div>
</div>

<script>
    var settings = { time: 45, rest: 30, series: 4, reps: 10 };
    var mode = 'time';
    var runtime = { currentSeries: 1, currentPhase: 'work', secondsLeft: 0, interval: null, audioCtx: null };

    // --- Lógica del Temporizador ---
    function runTimer(seconds) {
        runtime.secondsLeft = seconds;
        updateTimerDisplay();
        playBeep('start');

        clearInterval(runtime.interval);
        runtime.interval = setInterval(() => {
            runtime.secondsLeft--;
            updateTimerDisplay();

            // Lógica de los 5 segundos (PNL)
            if (runtime.secondsLeft <= 5 && runtime.secondsLeft > 0) {
                playBeep('tick');
            }

            if (runtime.secondsLeft <= 0) {
                clearInterval(runtime.interval);
                runtime.currentPhase === 'work' ? executeRest() : executeWork();
            }
        }, 1000);
    }

    function playBeep(type) {
        if (!runtime.audioCtx) runtime.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = runtime.audioCtx.createOscillator();
        var gain = runtime.audioCtx.createGain();
        osc.connect(gain); gain.connect(runtime.audioCtx.destination);
        
        if (type === 'tick') {
            osc.frequency.setValueAtTime(600, runtime.audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, runtime.audioCtx.currentTime);
            osc.start(); osc.stop(runtime.audioCtx.currentTime + 0.1);
        } else if (type === 'start') {
            osc.frequency.setValueAtTime(800, runtime.audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, runtime.audioCtx.currentTime);
            osc.start(); osc.stop(runtime.audioCtx.currentTime + 0.3);
        } else {
            osc.frequency.setValueAtTime(350, runtime.audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, runtime.audioCtx.currentTime);
            osc.start(); osc.stop(runtime.audioCtx.currentTime + 0.5);
        }
    }

    function updateTimerDisplay() {
        document.getElementById('workout-timer').innerText = runtime.secondsLeft;
    }

    // --- Funciones auxiliares (Simplificadas para mantener la fluidez) ---
    function chooseMode(m) { mode = m; document.getElementById('screen-modes').classList.remove('active'); document.getElementById('screen-setup').classList.add('active'); renderSelectors(); }
    function renderSelectors() { 
        document.getElementById('selectors-render').innerHTML = `
            <div style="margin-bottom:20px;">Tiempo Trabajo: <b id="val-time">${settings.time}s</b><br><input type="range" style="width:100%" min="5" max="120" value="${settings.time}" oninput="settings.time=this.value; document.getElementById('val-time').innerText=this.value+'s'"></div>
            <div style="margin-bottom:20px;">Descanso: <b id="val-rest">${settings.rest}s</b><br><input type="range" style="width:100%" min="5" max="120" value="${settings.rest}" oninput="settings.rest=this.value; document.getElementById('val-rest').innerText=this.value+'s'"></div>
        `; 
    }
    function triggerRocketLaunch() { 
        document.getElementById('screen-setup').classList.remove('active'); 
        document.getElementById('screen-train').classList.add('active'); 
        if(mode==='time') runTimer(settings.time); 
        else { setPhase('work'); document.getElementById('workout-timer').innerText = 'GO'; }
    }
    function setPhase(p) {
        runtime.currentPhase = p;
        document.body.className = p === 'rest' ? 'phase-rest' : '';
        document.getElementById('workout-badge').innerText = p.toUpperCase();
        document.getElementById('workout-badge').style.color = p === 'rest' ? '#0096ff' : '#CCFF00';
    }
    function executeRest() { setPhase('rest'); runTimer(settings.rest); }
    function executeWork() { 
        runtime.currentSeries++; 
        if(runtime.currentSeries > settings.series) { alert('¡COHETE EN ORBITA!'); location.reload(); }
        else { setPhase('work'); mode==='time' ? runTimer(settings.time) : (document.getElementById('workout-timer').innerText = 'GO'); }
    }
    function nextSegmentReps() { if(mode==='reps' && runtime.currentPhase==='work') executeRest(); }
    function forceQuit() { location.reload(); }
</script>
</body>
</html>
